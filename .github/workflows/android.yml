name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install NDK
      run: sdkmanager --install "ndk;25.2.9519653"
    
    - name: Clone SDL2 Libraries
      working-directory: android-project/app/jni
      run: |
        git clone --depth 1 -b release-2.28.x https://github.com/libsdl-org/SDL.git SDL2
        git clone --depth 1 --recursive -b SDL2 https://github.com/libsdl-org/SDL_ttf.git SDL2_ttf
        git clone --depth 1 --recursive -b SDL2 https://github.com/libsdl-org/SDL_mixer.git SDL2_mixer
    
    - name: Copy SDLActivity
      run: |
        mkdir -p android-project/app/src/main/java/org/libsdl/app/
        cp android-project/app/jni/SDL2/android-project/app/src/main/java/org/libsdl/app/*.java \
           android-project/app/src/main/java/org/libsdl/app/
    
    - name: Copy Game Source & Assets
      run: bash setup_android.sh
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9

    - name: Build Debug APK
      working-directory: android-project
      run: |
        if [ -f ./gradlew ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snadder-game-debug-apk
        path: android-project/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
